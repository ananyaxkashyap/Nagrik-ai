<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nagrik AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --wa-bg: #0b141a;
      --wa-chat-bg: #0b141a;
      --wa-header: #202c33;
      --wa-input-bg: #202c33;
      --wa-user-bubble: #005c4b;
      --wa-bot-bubble: #202c33;
      --wa-text: #e9edef;
      --wa-subtext: #8696a0;
      --wa-accent: #00a884;
      --wa-border: #2a3942;
      --wa-tick: #53bdeb;
      --wa-wallpaper: #0b141a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111b21;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Noto Sans', sans-serif;
    }

    /* Wallpaper pattern overlay */
    .wallpaper {
      position: fixed;
      inset: 0;
      background-color: #0b141a;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='0.8'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      z-index: 0;
    }

    .phone-frame {
      position: relative;
      z-index: 1;
      width: 390px;
      height: 720px;
      background: var(--wa-chat-bg);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    /* ── HEADER ── */
    .header {
      background: var(--wa-header);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--wa-border);
      flex-shrink: 0;
    }

    .back-arrow {
      color: var(--wa-subtext);
      font-size: 20px;
      cursor: pointer;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #005c4b, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-name {
      color: var(--wa-text);
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
    }

    .header-status {
      color: var(--wa-accent);
      font-size: 12px;
      margin-top: 1px;
    }

    .header-icons {
      display: flex;
      gap: 20px;
      color: var(--wa-subtext);
      font-size: 18px;
    }

    .header-icons span { cursor: pointer; }

    /* ── DATE PILL ── */
    .date-pill {
      text-align: center;
      margin: 12px auto 4px;
    }

    .date-pill span {
      background: #182229;
      color: var(--wa-subtext);
      font-size: 11.5px;
      padding: 4px 10px;
      border-radius: 6px;
    }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 4px; }

    /* ── MESSAGES ── */
    .msg-row {
      display: flex;
      margin-bottom: 2px;
    }

    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }

    .bubble {
      max-width: 75%;
      padding: 7px 10px 6px;
      border-radius: 8px;
      font-size: 14.2px;
      line-height: 1.5;
      color: var(--wa-text);
      position: relative;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-row.user .bubble {
      background: var(--wa-user-bubble);
      border-top-right-radius: 2px;
    }

    .msg-row.bot .bubble {
      background: var(--wa-bot-bubble);
      border-top-left-radius: 2px;
    }

    /* Tail for user bubble */
    .msg-row.user .bubble::after {
      content: '';
      position: absolute;
      top: 0; right: -8px;
      border: 8px solid transparent;
      border-top-color: var(--wa-user-bubble);
      border-right: none;
    }

    /* Tail for bot bubble */
    .msg-row.bot .bubble::after {
      content: '';
      position: absolute;
      top: 0; left: -8px;
      border: 8px solid transparent;
      border-top-color: var(--wa-bot-bubble);
      border-left: none;
    }

    .msg-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 3px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--wa-subtext);
    }

    .tick { font-size: 13px; color: var(--wa-tick); }

    /* Typing indicator */
    .typing-bubble {
      background: var(--wa-bot-bubble);
      border-radius: 8px;
      border-top-left-radius: 2px;
      padding: 10px 14px;
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--wa-subtext);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── INPUT AREA ── */
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--wa-bg);
      flex-shrink: 0;
    }

    .input-box {
      flex: 1;
      background: var(--wa-input-bg);
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      color: var(--wa-text);
      font-size: 14.5px;
      font-family: 'Noto Sans', sans-serif;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }

    .input-box::placeholder { color: var(--wa-subtext); }

    .icon-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .attach-btn {
      background: transparent;
      color: var(--wa-subtext);
      font-size: 20px;
    }

    .send-btn {
      background: var(--wa-accent);
      color: white;
      font-size: 18px;
    }

    .send-btn:hover { background: #00c49a; }
    .send-btn:disabled { background: #2a3942; cursor: not-allowed; }

    /* ── BOTTOM NAV BAR (like WhatsApp) ── */
    .nav-bar {
      background: var(--wa-header);
      display: flex;
      justify-content: space-around;
      padding: 6px 0 8px;
      border-top: 1px solid var(--wa-border);
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--wa-subtext);
      font-size: 10px;
      cursor: pointer;
    }

    .nav-item.active { color: var(--wa-accent); }
    .nav-item .nav-icon { font-size: 20px; }

    /* Slide-in animation for new messages */
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .msg-row.bot  { animation: slideInLeft  0.2s ease; }
    .msg-row.user { animation: slideInRight 0.2s ease; }
  </style>
</head>
<body>

<div class="wallpaper"></div>

<div class="phone-frame">

  <!-- Header -->
  <div class="header">
    <div class="back-arrow">←</div>
    <div class="avatar">🇮🇳</div>
    <div class="header-info">
      <div class="header-name">Nagrik AI</div>
      <div class="header-status" id="statusText">online</div>
    </div>
    <div class="header-icons">
      <span title="Video call">📹</span>
      <span title="Voice call">📞</span>
      <span title="More">⋮</span>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="date-pill"><span>TODAY</span></div>

    <!-- Welcome message -->
    <div class="msg-row bot">
      <div class="bubble">
        🙏 Namaste! I'm <strong>Nagrik AI</strong>, your personal government services assistant.<br><br>
        I can help you with Aadhaar, PAN, Ration Card, PM schemes, and much more.<br><br>
        आप हिंदी में भी पूछ सकते हैं! 😊
        <div class="msg-meta">
          <span class="msg-time" id="welcomeTime"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Row -->
  <div class="input-row">
    <button class="icon-btn attach-btn" title="Attach">📎</button>
    <textarea class="input-box" id="userInput" rows="1" placeholder="Message Nagrik AI..."></textarea>
    <button class="icon-btn send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
  </div>

  <!-- Bottom Nav -->
  <div class="nav-bar">
    <div class="nav-item active">
      <span class="nav-icon">💬</span>
      <span>Chats</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📋</span>
      <span>Schemes</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">🔔</span>
      <span>Updates</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">👤</span>
      <span>Profile</span>
    </div>
  </div>

</div>

<script>
  const BACKEND_URL = "http://localhost:5000/ask";

  // Set welcome time
  document.getElementById("welcomeTime").textContent = getTime();

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // Auto-resize textarea
  const textarea = document.getElementById("userInput");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 100) + "px";
  });

  textarea.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function appendMessage(text, role) {
    const chatArea = document.getElementById("chatArea");

    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `${escapeHtml(text)}<div class="msg-meta"><span class="msg-time">${getTime()}</span>${role === 'user' ? '<span class="tick">✓✓</span>' : ''}</div>`;

    row.appendChild(bubble);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return row;
  }

  function showTyping() {
    const chatArea = document.getElementById("chatArea");
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typingIndicator";
    row.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, "<br>");
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusText = document.getElementById("statusText");
    const userText = input.value.trim();

    if (!userText) return;

    appendMessage(userText, "user");
    input.value = "";
    input.style.height = "auto";
    input.disabled = true;
    sendBtn.disabled = true;
    statusText.textContent = "typing...";

    showTyping();

    try {
      const response = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: userText }),
      });

      const data = await response.json();
      removeTyping();

      if (data.error) {
        appendMessage("⚠️ " + (data.details || data.error), "bot");
      } else {
        appendMessage(data.answer, "bot");
      }

    } catch (err) {
      removeTyping();
      appendMessage("⚠️ Could not connect to server. Make sure backend is running on port 5000.", "bot");
    }

    statusText.textContent = "online";
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
